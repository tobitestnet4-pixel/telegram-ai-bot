services:
  telegram-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sarah-ai-bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - OPENROUTER_MODEL=openrouter/free
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

networks:
  default:
    name: sarah-bot-network