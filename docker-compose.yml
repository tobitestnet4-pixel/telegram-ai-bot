# Render Deployment Config
# Deploy this on Render.com with:
# 1. Copy .env secrets to Render environment
# 2. Set WEBHOOK_URL to your Render service URL
# 3. Deploy as Web Service

services:
  telegram-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sarah-ai-bot
    restart: unless-stopped
    ports:
      - "${PORT:-10000}:${PORT:-10000}"
    env_file:
      - .env
    environment:
      - OPENROUTER_MODEL=openrouter/free
      - USE_WEBHOOK=true
      - ENVIRONMENT=production
      - WEBHOOK_URL=${WEBHOOK_URL:-}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PORT:-10000}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
        window: 120s

networks:
  default:
    name: sarah-bot-networkservices:
